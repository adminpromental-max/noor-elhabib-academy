<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>تسجيل الدخول | لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login">
    <div class="admin-login-box">
      <img src="/assets/logo.jpg" alt="نور الحبيب" width="72" height="72" style="border-radius:50%;margin-bottom:16px">
      <h1>لوحة تحكم المقالات</h1>
      <p>أكاديمية نور الحبيب — إدارة المحتوى</p>
      <div id="loginAlert"></div>

      <!-- تسجيل الدخول -->
      <div id="loginView">
        <form id="loginForm">
          <div class="admin-form-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" required autocomplete="email" placeholder="example@email.com">
          </div>
          <div class="admin-form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%">دخول</button>
        </form>
        <p style="text-align:center;margin-top:16px">
          <button type="button" id="showForgotBtn" class="admin-link-btn">نسيت كلمة المرور؟</button>
        </p>
      </div>

      <!-- استعادة كلمة المرور -->
      <div id="forgotView" hidden>
        <p class="admin-hint" style="margin-bottom:16px;text-align:center">
          أدخلي بريدك الإلكتروني وسنرسل لك رابطاً لتعيين كلمة مرور جديدة
        </p>
        <form id="forgotForm">
          <div class="admin-form-group">
            <label for="forgotEmail">البريد الإلكتروني</label>
            <input type="email" id="forgotEmail" required autocomplete="email" placeholder="example@email.com">
          </div>
          <button type="submit" class="btn btn-primary" id="forgotBtn" style="width:100%">إرسال رابط التغيير</button>
        </form>
        <p style="text-align:center;margin-top:16px">
          <button type="button" id="showLoginBtn" class="admin-link-btn">العودة لتسجيل الدخول</button>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const alertBox = document.getElementById('loginAlert');
    const loginView = document.getElementById('loginView');
    const forgotView = document.getElementById('forgotView');

    function showAlert(msg, type = 'error') {
      alertBox.innerHTML = `<div class="admin-alert ${type}">${msg}</div>`;
    }

    if (!SITE_CONFIG.supabaseUrl || !SITE_CONFIG.supabaseAnonKey) {
      showAlert('إعدادات Supabase غير مكتملة — راجعي ملف config.js');
    }

    Auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = '/admin/dashboard.html';
    });

    document.getElementById('showForgotBtn').addEventListener('click', () => {
      loginView.hidden = true;
      forgotView.hidden = false;
      alertBox.innerHTML = '';
      document.getElementById('forgotEmail').value = document.getElementById('email').value;
    });

    document.getElementById('showLoginBtn').addEventListener('click', () => {
      forgotView.hidden = true;
      loginView.hidden = false;
      alertBox.innerHTML = '';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'جاري الدخول...';
      alertBox.innerHTML = '';

      const { error } = await Auth.signIn(
        document.getElementById('email').value,
        document.getElementById('password').value
      );

      btn.disabled = false;
      btn.textContent = 'دخول';

      if (error) {
        showAlert(Auth.translateError(error.message));
        return;
      }
      window.location.href = '/admin/dashboard.html';
    });

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.textContent = 'جاري الإرسال...';
      alertBox.innerHTML = '';

      const { error } = await Auth.sendPasswordReset(
        document.getElementById('forgotEmail').value
      );

      btn.disabled = false;
      btn.textContent = 'إرسال رابط التغيير';

      if (error) {
        showAlert(Auth.translateError(error.message));
        return;
      }

      showAlert('تم إرسال رابط تغيير كلمة المرور إلى بريدك — راجعي صندوق الوارد والرسائل غير المرغوبة', 'success');
    });
  </script>
</body>
</html>
