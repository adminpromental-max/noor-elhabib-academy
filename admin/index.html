<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>تسجيل الدخول | لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login">
    <div class="admin-login-box">
      <img src="/assets/logo.jpg" alt="نور الحبيب" width="72" height="72" style="border-radius:50%;margin-bottom:16px">
      <h1>لوحة تحكم المقالات</h1>
      <p>أكاديمية نور الحبيب — إدارة المحتوى</p>
      <div id="loginAlert"></div>
      <form id="loginForm">
        <div class="admin-form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="admin-form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">دخول</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/site.js"></script>
  <script>
    const client = window.supabase?.createClient(
      SITE_CONFIG.supabaseUrl,
      SITE_CONFIG.supabaseAnonKey
    );

    if (!SITE_CONFIG.supabaseUrl) {
      document.getElementById('loginAlert').innerHTML =
        '<div class="admin-alert error">يرجى إعداد Supabase في ملف config.js أولاً</div>';
    }

    client?.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = '/admin/dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('loginAlert').innerHTML =
          `<div class="admin-alert error">${error.message}</div>`;
      } else {
        window.location.href = '/admin/dashboard.html';
      }
    });
  </script>
</body>
</html>
