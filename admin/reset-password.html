<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>تعيين كلمة مرور جديدة | لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login">
    <div class="admin-login-box">
      <img src="/assets/logo.jpg" alt="نور الحبيب" width="72" height="72" style="border-radius:50%;margin-bottom:16px">
      <h1>كلمة مرور جديدة</h1>
      <p>أكاديمية نور الحبيب — لوحة التحكم</p>
      <div id="resetAlert"></div>

      <div id="resetFormView" hidden>
        <form id="resetForm">
          <div class="admin-form-group">
            <label for="newPassword">كلمة المرور الجديدة</label>
            <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
            <p class="admin-hint">6 أحرف على الأقل</p>
          </div>
          <div class="admin-form-group">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary" id="resetBtn" style="width:100%">حفظ والدخول للوحة</button>
        </form>
      </div>

      <div id="resetLoading">
        <p class="admin-hint" style="text-align:center">جاري التحقق من الرابط...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const alertBox = document.getElementById('resetAlert');
    const formView = document.getElementById('resetFormView');
    const loadingView = document.getElementById('resetLoading');

    function showAlert(msg, type = 'error') {
      alertBox.innerHTML = `<div class="admin-alert ${type}">${msg}</div>`;
    }

    async function init() {
      const client = Auth.getClient();
      if (!client) {
        loadingView.hidden = true;
        showAlert('إعدادات Supabase غير مكتملة');
        return;
      }

      // Supabase يضع التوكن في الرابط عند الضغط من الإيميل
      const { data, error } = await client.auth.getSession();

      if (error || !data.session) {
        // انتظار قصير لمعالجة الرابط
        await new Promise((r) => setTimeout(r, 1500));
        const retry = await client.auth.getSession();
        if (!retry.data.session) {
          loadingView.hidden = true;
          showAlert('الرابط غير صالح أو منتهي الصلاحية. اطلبي رابطاً جديداً من صفحة «نسيت كلمة المرور»');
          return;
        }
      }

      loadingView.hidden = true;
      formView.hidden = false;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (newPass !== confirm) {
        showAlert('كلمتا المرور غير متطابقتين');
        return;
      }

      if (newPass.length < 6) {
        showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = 'جاري الحفظ...';

      const { error } = await Auth.updatePassword(newPass);

      if (error) {
        btn.disabled = false;
        btn.textContent = 'حفظ والدخول للوحة';
        showAlert(Auth.translateError(error.message));
        return;
      }

      showAlert('تم تغيير كلمة المرور بنجاح! جاري تحويلك للوحة...', 'success');
      setTimeout(() => {
        window.location.href = '/admin/dashboard.html';
      }, 1500);
    });

    init();
  </script>
</body>
</html>
